schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  Projeto: FlowNC — editor seguro de substituições em lote para programas CNC.
  Stack: Python >=3.11, CLI (cli.py), GUI opcional com PySide6.
  Estrutura: core/ (models, matcher, replacer, replacement_plan, verifier, session_log), tests/ (pytest).
  Convenções: nomenclatura e documentação em português; mypy strict no core/; ruff line-length 100.
  Domínio: usinagem CNC — fórmulas validadas contra normas (ISO, Sandvik). Segurança de substituição é prioridade.

